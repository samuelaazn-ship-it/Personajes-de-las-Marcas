<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Personajes de la campaña</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="index-page">
  <main class="shell">
    <header class="party-header">
      <div>
        <div class="eyebrow">Campaña propia</div>
        <h1>Personajes</h1>
      </div>
      <p>Fichas rápidas para consultar en mesa.</p>
    </header>

    <nav class="tabs" aria-label="Personajes">
      <button class="tab is-active" type="button" data-character="characters/aberroes.html">
        Aberroes Dash
      </button>
      <button class="tab" type="button" data-character="characters/izzerin.html">
        Izzerin Teken'iryn
      </button>
    </nav>

    <iframe
      id="characterFrame"
      class="character-frame"
      title="Ficha de personaje"
      src="characters/aberroes.html"
    ></iframe>
  </main>

  <script>
    const frame = document.querySelector("#characterFrame");
    const tabs = document.querySelectorAll(".tab");

    function resizeFrame() {
      try {
        const doc = frame.contentDocument || frame.contentWindow.document;
        if (!doc) return;
        frame.style.height = `${doc.documentElement.scrollHeight}px`;
      } catch {
        frame.style.height = "1200px";
      }
    }

    tabs.forEach((tab) => {
      tab.addEventListener("click", () => {
        tabs.forEach((item) => item.classList.remove("is-active"));
        tab.classList.add("is-active");
        frame.src = tab.dataset.character;
      });
    });

    frame.addEventListener("load", resizeFrame);
    window.addEventListener("resize", resizeFrame);
  </script>
</body>
</html>
